<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>InstaBio AI</title><link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"></head><body class="bg-gray-100 flex items-center justify-center min-h-screen"><div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md"><h1 class="text-3xl font-bold text-center mb-6">InstaBio AI</h1><p class="text-center text-gray-600 mb-6">Craft your perfect Instagram bio instantly!</p><form id="bio-form" class="space-y-4"><input type="text" id="keywords" placeholder="Keywords (e.g., travel, food, art)" class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"><input type="text" id="theme" placeholder="Theme (e.g., witty, professional, adventurous)" class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"><input type="text" id="emojis" placeholder="Emojis (e.g., 🐬🌈)" class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"><button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50">Generate Bio - {{PRICE}}</button></form><div id="result" class="mt-6 p-4 bg-gray-50 border border-gray-200 rounded hidden"></div><p class="text-center text-gray-500 text-sm mt-6">Powered by AI</p></div><script>document.getElementById('bio-form').addEventListener('submit', async (e) => { e.preventDefault(); const keywords = document.getElementById('keywords').value; const theme = document.getElementById('theme').value; const emojis = document.getElementById('emojis').value; try { const response = await fetch('/api/generate-bio', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ keywords, theme, emojis }) }); const data = await response.json(); if (data.bio) { document.getElementById('result').innerText = data.bio; document.getElementById('result').classList.remove('hidden'); } else if (data.error) { document.getElementById('result').innerText = 'Error: ' + data.error; document.getElementById('result').classList.remove('hidden'); } } catch (error) { document.getElementById('result').innerText = 'An unexpected error occurred.'; document.getElementById('result').classList.remove('hidden'); } });</script></body></html>
