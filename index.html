<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>AI Bio Generator</title><style>body{font-family:sans-serif;display:flex;flex-direction:column;align-items:center;padding:20px;margin:0;background:#f0f2f5;}h1{color:#333;}div{margin-bottom:15px;width:100%;max-width:400px;}label{display:block;margin-bottom:5px;font-weight:bold;}input,textarea,select{width:100%;padding:10px;border:1px solid #ddd;border-radius:5px;box-sizing:border-box;}button{padding:10px 20px;background:#007bff;color:white;border:none;border-radius:5px;cursor:pointer;font-size:16px;}button:hover{background:#0056b3;}#output{margin-top:20px;padding:15px;background:#e9ecef;border-radius:5px;min-height:80px;white-space:pre-wrap;}#copyBtn{margin-left:10px;background:#28a745;}#copyBtn:hover{background:#218838;}</style></head><body><h1>AI Instagram Bio Generator</h1><div><label for="keywords">Keywords:</label><input type="text" id="keywords" placeholder="e.g., travel, foodie, entrepreneur"></div><div><label for="tone">Tone:</label><select id="tone"><option value="playful">Playful</option><option value="professional">Professional</option><option value="inspirational">Inspirational</option><option value="witty">Witty</option></select></div><div><label for="emoji">Emoji Preference:</label><input type="text" id="emoji" placeholder="e.g., ✨🚀🍕"></div><button onclick="generateBio()">Generate Bio</button><div><label for="output">Generated Bio:</label><textarea id="output" readonly></textarea><button id="copyBtn" onclick="copyBio()">Copy</button></div><script>async function generateBio(){const k=document.getElementById('keywords').value;const t=document.getElementById('tone').value;const e=document.getElementById('emoji').value;const o=document.getElementById('output');o.value='Generating...';try{const r=await fetch('/api/generate-bio',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({keywords:k,tone:t,emoji:e})});if(!r.ok)throw new Error('Bio generation failed.');const d=await r.json();o.value=d.bio;}catch(err){o.value='Error: '+err.message;}}function copyBio(){const o=document.getElementById('output');o.select();document.execCommand('copy');alert('Bio copied to clipboard!');}</script></body></html>
