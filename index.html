<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>AI Bio Generator</title><meta name="description" content="Generate unique Instagram bios with AI."><link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"><style>body{font-family:sans-serif;}h1,h2{font-weight:bold;}#loading{display:none;}</style></head><body class="bg-gray-100 flex items-center justify-center min-h-screen"><div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md"><h1 class="text-3xl mb-4 text-center">AI Bio Generator</h1><p class="text-center mb-6 text-gray-600">Craft your perfect Instagram bio instantly!</p><div id="paymentSection"><button id="buyButton" class="w-full bg-blue-500 text-white py-2 px-4 rounded hover:bg-blue-600">Buy Now - $9.99</button><p class="text-sm text-gray-500 text-center mt-2">Secure payment via Stripe Checkout.</p></div><div id="appSection" style="display:none;"><div class="mb-4"><label for="keywords" class="block text-sm font-medium text-gray-700">Keywords (e.g., travel, food, tech):</label><input type="text" id="keywords" class="mt-1 p-2 w-full border rounded-md"></div><div class="mb-4"><label for="tone" class="block text-sm font-medium text-gray-700">Tone (e.g., funny, professional, quirky):</label><input type="text" id="tone" class="mt-1 p-2 w-full border rounded-md"></div><div class="mb-4"><label for="emoji" class="block text-sm font-medium text-gray-700">Emoji Preference (e.g., yes, no, specific emojis):</label><input type="text" id="emoji" class="mt-1 p-2 w-full border rounded-md"></div><button id="generateBio" class="w-full bg-green-500 text-white py-2 px-4 rounded hover:bg-green-600">Generate Bio</button><div id="loading" class="text-center mt-4 text-gray-500">Generating...</div><div id="result" class="mt-6 p-4 bg-gray-50 border rounded-md text-gray-800 break-words" style="min-height: 80px;"></div><button id="copyBio" class="mt-4 w-full bg-gray-200 text-gray-800 py-2 px-4 rounded hover:bg-gray-300" style="display:none;">Copy Bio</button></div></div><script>document.getElementById('buyButton').addEventListener('click', async () => {/* Simulating Stripe Checkout for initial build */alert('Proceeding to payment (simulated). On successful payment, generation features will unlock.');document.getElementById('paymentSection').style.display = 'none';document.getElementById('appSection').style.display = 'block';});document.getElementById('generateBio').addEventListener('click', async () => {document.getElementById('loading').style.display = 'block';document.getElementById('result').textContent = '';document.getElementById('copyBio').style.display = 'none';const keywords = document.getElementById('keywords').value;const tone = document.getElementById('tone').value;const emoji = document.getElementById('emoji').value;const prompt = `Generate a creative Instagram bio based on these keywords: ${keywords}, tone: ${tone}, emoji preference: ${emoji}. Max 160 characters.`;/* Placeholder for LLM API call */setTimeout(() => {const generatedBio = `AI-powered bio for: ${keywords}. Tone: ${tone}. Likes: ${emoji}. ✨✍️ #InstaBio`;document.getElementById('result').textContent = generatedBio;document.getElementById('loading').style.display = 'none';document.getElementById('copyBio').style.display = 'block';}, 2000);});document.getElementById('copyBio').addEventListener('click', () => {const bioText = document.getElementById('result').textContent;navigator.clipboard.writeText(bioText).then(() => alert('Bio copied to clipboard!'));});</script></body></html>
