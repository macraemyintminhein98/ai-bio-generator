<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioGenie AI Bio Generator</title>
    <meta name="description" content="Generate creative and engaging Instagram bios using AI.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-300 to-purple-400 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-lg shadow-xl w-full max-w-md">
        <h1 class="text-4xl font-bold text-center mb-6 text-gray-800">BioGenie</h1>
        <p class="text-center text-gray-600 mb-8">Craft your perfect Instagram bio with AI.</p>
        <form id="bioForm" class="space-y-4">
            <div>
                <label for="keywords" class="block text-gray-700 text-sm font-semibold mb-2">Keywords (e.g., travel, foodie):</label>
                <input type="text" id="keywords" class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="adventure, photography" required>
            </div>
            <div>
                <label for="tone" class="block text-gray-700 text-sm font-semibold mb-2">Tone:</label>
                <select id="tone" class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="friendly">Friendly</option>
                    <option value="professional">Professional</option>
                    <option value="witty">Witty</option>
                    <option value="adventurous">Adventurous</option>
                </select>
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-md transition duration-300">Generate Bio</button>
        </form>
        <div id="results" class="mt-8 p-4 bg-gray-50 border rounded-md hidden">
            <h2 class="text-xl font-semibold text-gray-700 mb-3">Your AI-Generated Bio:</h2>
            <p id="generatedBio" class="text-gray-800 whitespace-pre-wrap"></p>
            <button id="copyBio" class="mt-4 bg-green-500 hover:bg-green-600 text-white text-sm py-2 px-4 rounded-md">Copy Bio</button>
        </div>
        <p class="text-center text-sm text-gray-500 mt-6">Ready to upgrade your bio?</p>
        <a href="#" id="stripeCheckoutLink" class="block text-center mt-2 text-blue-600 hover:underline font-semibold">Get unlimited bios for just $9.99!</a>
    </div>

    <script>
        document.getElementById('bioForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const keywords = document.getElementById('keywords').value;
            const tone = document.getElementById('tone').value;
            const generateBtn = e.target.querySelector('button');
            generateBtn.textContent = 'Generating...';
            generateBtn.disabled = true;

            try {
                // In a real app, this would be a fetch to your Vercel serverless function
                // For demo, we'll simulate a response.
                const simulatedBio = `✨ Passionate ${keywords.split(',')[0].trim()} | Exploring the world with a ${tone} spirit! 🌍 | DM for collabs!`;
                
                document.getElementById('generatedBio').textContent = simulatedBio;
                document.getElementById('results').classList.remove('hidden');
            } catch (error) {
                console.error('Error generating bio:', error);
                document.getElementById('generatedBio').textContent = 'Error generating bio. Please try again.';
                document.getElementById('results').classList.remove('hidden');
            } finally {
                generateBtn.textContent = 'Generate Bio';
                generateBtn.disabled = false;
            }
        });

        document.getElementById('copyBio').addEventListener('click', () => {
            const bioText = document.getElementById('generatedBio').textContent;
            navigator.clipboard.writeText(bioText).then(() => {
                alert('Bio copied to clipboard!');
            }).catch(err => {
                console.error('Failed to copy bio: ', err);
            });
        });

        // Simulate Stripe Checkout Link for demonstration
        document.getElementById('stripeCheckoutLink').href = 'https://buy.stripe.com/test_eVa3dZ6WJbyj9y88ww'; // Replace with your actual Stripe Payment Link
    </script>
</body>
</html>
