<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>InstaBio AI</title><style>body{font-family:sans-serif;margin:0;padding:20px;background:#f4f7f6;color:#333;display:flex;flex-direction:column;align-items:center;min-height:100vh}h1{color:#6c5ce7;margin-bottom:20px}p{text-align:center;max-width:600px;line-height:1.6}form{background:white;padding:30px;border-radius:10px;box-shadow:0 4px 15px rgba(0,0,0,0.1);display:flex;flex-direction:column;width:100%;max-width:500px;margin-top:20px}label{margin-bottom:8px;font-weight:bold;color:#555}input,textarea{padding:12px;margin-bottom:20px;border:1px solid #ddd;border-radius:6px;font-size:16px;width:calc(100% - 24px)}button{background:#6c5ce7;color:white;padding:14px 20px;border:none;border-radius:6px;cursor:pointer;font-size:17px;font-weight:bold;transition:background 0.3s ease}button:hover{background:#5a4ad1}#bioOutput{margin-top:25px;padding:20px;background:#e9f7ef;border:1px solid #c8e6c9;border-radius:8px;white-space:pre-wrap;word-wrap:break-word;color:#333;font-size:16px;min-height:80px;display:none}</style></head><body><h1>InstaBio AI</h1><p>Craft the perfect Instagram bio with the power of AI! Tell us about yourself, and we'll generate a catchy, personalized bio.</p><form><label for="interests">Interests & Keywords:</label><input type="text" id="interests" placeholder="e.g., photography, travel, coding, funny" required><label for="mood">Desired Mood/Vibe:</label><input type="text" id="mood" placeholder="e.g., professional, witty, adventurous, inspiring"><label for="prompt">Anything else we should know?</label><textarea id="prompt" rows="3" placeholder="e.g., I'm a dog lover, freelance designer, or seeking new opportunities"></textarea><button type="submit">Generate Bio</button></form><div id="bioOutput"></div><script>document.querySelector('form').addEventListener('submit', async (e) => { e.preventDefault(); const interests = document.getElementById('interests').value; const mood = document.getElementById('mood').value; const prompt = document.getElementById('prompt').value; const bioOutput = document.getElementById('bioOutput'); bioOutput.style.display = 'block'; bioOutput.innerText = 'Generating your bio...'; try { const response = await fetch('/api/generate-bio', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ interests, mood, prompt }) }); const data = await response.json(); if (response.ok) { bioOutput.innerText = data.bio; } else { bioOutput.innerText = `Error: ${data.error || 'Something went wrong!'}`; } } catch (error) { console.error('Fetch error:', error); bioOutput.innerText = 'Network error. Please try again.'; }});</script></body></html>
