<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>InstaBio AI</title><link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"></head><body class="bg-gray-50 flex items-center justify-center min-h-screen"><div class="bg-white p-8 rounded-lg shadow-lg max-w-md w-full text-center"><h1 class="text-3xl font-bold text-gray-800 mb-4">InstaBio AI</h1><p class="text-gray-600 mb-6">Craft your perfect Instagram bio instantly!</p><p class="text-sm text-gray-500 mb-4">Generate 1 bio for $4.99</p><form onsubmit="alert('This is a demo! Bio generation and payment are not active yet.'); return false;" class="space-y-4"><input type="text" placeholder="Your interests (e.g., travel, food)" class="w-full p-3 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500"><input type="text" placeholder="Your profession (optional)" class="w-full p-3 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500"><select class="w-full p-3 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500"><option value="witty">Witty</option><option value="professional">Professional</option><option value="minimalist">Minimalist</option><option value="adventurous">Adventurous</option></select><button type="submit" class="w-full bg-blue-600 text-white p-3 rounded-md hover:bg-blue-700 transition duration-300">Generate Bio</button></form><hr class="my-6"><div id="generated-bio" class="bg-gray-100 p-4 rounded-md text-left text-gray-700 min-h-[80px]"><p class="text-gray-500">Your amazing bio will appear here!</p></div><button onclick="navigator.clipboard.writeText(document.getElementById('generated-bio').innerText); alert('Bio copied!');" class="mt-4 w-full bg-green-500 text-white p-3 rounded-md hover:bg-green-600 transition duration-300">Copy Bio</button><p class="mt-6 text-xs text-gray-400">A product by APEX.</p></div></body></html>
