<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Bio Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-r from-purple-400 via-pink-500 to-red-500 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-2xl p-8 max-w-md w-full text-center">
        <h1 class="text-4xl font-extrabold text-gray-900 mb-4">BioBloom AI</h1>
        <p class="text-gray-600 mb-6">Craft your perfect Instagram bio instantly!</p>
        <input type="text" id="keywordsInput" class="w-full p-3 border border-gray-300 rounded-lg mb-4 focus:ring-purple-500 focus:border-purple-500" placeholder="e.g., 'travel blogger, foodie, adventurous'">
        <button id="generateButton" class="w-full bg-purple-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-purple-700 transition-colors mb-6">
            Generate Bios
        </button>
        <div id="results" class="space-y-4"></div>
        <p class="text-sm text-gray-500 mt-6">Powered by AI.</p>
    </div>
    <script>
        const keywordsInput = document.getElementById('keywordsInput');
        const generateButton = document.getElementById('generateButton');
        const resultsDiv = document.getElementById('results');

        generateButton.addEventListener('click', async () => {
            const keywords = keywordsInput.value.trim();
            if (!keywords) {
                alert('Please enter some keywords.');
                return;
            }

            resultsDiv.innerHTML = '<p class="text-gray-600">Generating amazing bios...</p>';
            // In a real app, this would call a backend API that uses OpenAI.
            // For this static demo, we'll simulate a response.
            setTimeout(() => {
                const dummyBios = [
                    `Wanderlust & Coffee Dust ☕️ | Exploring the world one bite at a time ✈️`, 
                    `Foodie | Globetrotter | Adventure Seeker | Living life deliciously 🌍`, 
                    `Passionately curious about everything vibrant. Creator & Dreamer. Let's connect! ✨`
                ];
                resultsDiv.innerHTML = dummyBios.map(bio => `
                    <div class="bg-gray-100 p-4 rounded-lg text-left relative group">
                        <p class="text-gray-800 text-sm">${bio}</p>
                        <button onclick="navigator.clipboard.writeText('${bio.replace(/'/g, "\'")}')" class="absolute top-2 right-2 p-2 bg-purple-200 text-purple-800 rounded-full text-xs opacity-0 group-hover:opacity-100 focus:opacity-100 transition-opacity">
                            Copy
                        </button>
                    </div>
                `).join('');
            }, 2000);
        });
    </script>
</body>
</html>
