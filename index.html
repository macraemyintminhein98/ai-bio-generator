s = [`✨ ${input}. Spreading joy one post at a time!`, `☕ Travel enthusiast & ${input}. Let's connect!`, `😂 Laughing through life. Powered by ${input}.`]; resolve({ generated_bios: mockBios.join('\n\n') }); }, 1500)); document.getElementById('outputContent').innerText = response.generated_bios; } catch (error) { console.error('Error generating bio:', error); document.getElementById('outputContent').innerText = 'Error generating bio. Please try again.'; }}document.getElementById('bioForm').addEventListener('submit', (e) => { e.preventDefault(); generateBio(); });function copyBio() { const bioText = document.getElementById('outputContent').innerText; navigator.clipboard.writeText(bioText).then(() => { alert('Bio copied to clipboard!'); }).catch(err => { console.error('Failed to copy bio: ', err); });}</script></body></html>
