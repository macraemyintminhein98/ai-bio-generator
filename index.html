<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioBoost AI</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 20px; background-color: #f7f7f7; color: #333; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        h1 { color: #5a5a5a; margin-bottom: 25px; font-size: 2.2em; text-align: center; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; width: 100%; text-align: center; }
        textarea, select, button { width: calc(100% - 20px); padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ddd; font-size: 1em; box-sizing: border-box; }
        textarea { min-height: 100px; resize: vertical; }
        button { background-color: #6a11cb; color: white; border: none; cursor: pointer; transition: background-color 0.3s ease; }
        button:hover { background-color: #2575fc; }
        #output { background-color: #e9ecef; padding: 15px; border-radius: 8px; border: 1px solid #dee2e6; text-align: left; word-wrap: break-word; min-height: 50px; display: flex; align-items: center; justify-content: center; color: #555; font-style: italic; }
        .copy-btn { background-color: #28a745; margin-top: 10px; display: none; }
        .copy-btn:hover { background-color: #218838; }
        footer { margin-top: 40px; font-size: 0.8em; color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ BioBoost AI</h1>
        <p>Craft the perfect Instagram bio with AI.</p>
        <textarea id="keywords" placeholder="Keywords (e.g., 'travel, food, dog lover')"></textarea>
        <select id="tone">
            <option value="professional">Professional</option>
            <option value="funny">Funny</option>
            <option value="wanderlust">Wanderlust</option>
            <option value="creative">Creative</option>
            <option value="minimalist">Minimalist</option>
        </select>
        <button onclick="generateBio()">Generate Bio</button>
        <div id="output">Your AI-generated bio will appear here.</div>
        <button class="copy-btn" onclick="copyBio()" id="copyButton">Copy Bio</button>
    </div>
    <footer>
        &copy; 2024 BioBoost AI. All rights reserved.
    </footer>
    <script>
        async function generateBio() {
            const keywords = document.getElementById('keywords').value;
            const tone = document.getElementById('tone').value;
            const outputDiv = document.getElementById('output');
            const copyBtn = document.getElementById('copyButton');
            outputDiv.textContent = 'Generating...';
            copyBtn.style.display = 'none';

            // This is a placeholder. In a real app, this would call a backend API.
            // Example: try { const response = await fetch('/api/generate-bio', { method: 'POST', body: JSON.stringify({ keywords, tone }), headers: { 'Content-Type': 'application/json' } }); const data = await response.json(); outputDiv.textContent = data.bio; copyBtn.style.display = 'block'; } catch (error) { outputDiv.textContent = 'Error generating bio.'; } 
            
            // Mock API response for front-end demo:
            setTimeout(() => {
                const mockBios = [
                    `Wanderer ✈️🌎 |  Chasing sunsets & good food 🍔 | Spreading positive vibes ✨`,
                    `Laughing my way through life 😂 | Professional napper 😴 |  Powered by coffee & sarcasm. `,
                    `Building the future, one byte at a time 💻 | Innovator & Problem Solver | Connect with me 👇`,
                    `Lover of all things beautiful 🎨 | Creating my own sunshine ☀️ |  Let's inspire each other.`
                ];
                const randomIndex = Math.floor(Math.random() * mockBios.length);
                outputDiv.textContent = mockBios[randomIndex];
                copyBtn.style.display = 'block';
            }, 1500);
        }

        function copyBio() {
            const outputDiv = document.getElementById('output');
            navigator.clipboard.writeText(outputDiv.textContent)
                .then(() => {
                    alert('Bio copied to clipboard!');
                })
                .catch(err => {
                    console.error('Failed to copy: ', err);
                });
        }
    </script>
</body>
</html>
