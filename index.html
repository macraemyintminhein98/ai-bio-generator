<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioBoost AI</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-r from-purple-400 via-pink-500 to-red-500 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-2xl p-8 max-w-md w-full text-center">
        <h1 class="text-4xl font-extrabold mb-4 text-gray-800">BioBoost AI</h1>
        <p class="text-lg mb-6 text-gray-600">Craft your perfect Instagram bio instantly!</p>
        <form id="bioForm">
            <input type="text" id="keywords" placeholder="Keywords (e.g., dog owner, traveler)" class="w-full p-3 mb-4 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-500" required>
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg transition duration-300 ease-in-out">
                Generate Bio <span class="ml-2 text-sm">✨</span>
            </button>
        </form>
        <div id="results" class="mt-6 p-4 bg-gray-100 rounded-lg text-left hidden">
            <p class="text-gray-700 font-semibold mb-2">Your AI Bio Ideas:</p>
            <ul id="bioList" class="list-disc list-inside text-gray-800"></ul>
        </div>
        <p class="text-sm text-gray-500 mt-6">Powered by advanced AI. <br> <span class="font-semibold">$4.99</span> for unlimited generations.</p>
    </div>

    <script>
        document.getElementById('bioForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const keywords = document.getElementById('keywords').value;
            const resultsDiv = document.getElementById('results');
            const bioList = document.getElementById('bioList');
            bioList.innerHTML = ''; 
            resultsDiv.classList.remove('hidden');

            // Simulate API call (replace with actual AI API integration and Stripe)
            const mockBios = [
                `Dog owner 🐾 | Exploring the world one paw print at a time ✈️ | Coffee enthusiast ☕`, 
                `Wanderlust seeker & code weaver 💻 | Making memories, taking photos 📸 | fueled by passion.`, 
                `Life's an adventure, embrace it! ✨ | Travel junkie 🌍 | Building dreams, one line of code at a time.`
            ];
            mockBios.forEach(bio => {
                const li = document.createElement('li');
                li.textContent = bio;
                bioList.appendChild(li);
            });
            // In a real app, this is where you'd call an API and then trigger Stripe Checkout
            // Example: const response = await fetch('/api/generate-bio', { method: 'POST', body: JSON.stringify({ keywords }) });
            // const data = await response.json();
            // data.bios.forEach(bio => { /* add to list */ });
            // Trigger Stripe checkout if payment is required first

        });
    </script>
</body>
</html>
