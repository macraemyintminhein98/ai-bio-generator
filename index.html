<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Bio Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f7fafc; }
        .container { max-width: 500px; padding: 2rem; background: white; border-radius: 0.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        textarea { min-height: 100px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-3xl font-bold mb-6 text-center">AI Instagram Bio Generator</h1>
        <p class="mb-4 text-center text-gray-600">Craft the perfect Instagram bio instantly!</p>
        <form id="bioForm" class="space-y-4">
            <div>
                <label for="keywords" class="block text-sm font-medium text-gray-700">Keywords / Niche:</label>
                <textarea id="keywords" name="keywords" rows="3" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500" placeholder="e.g., 'travel blogger, foodie, adventurer'" required></textarea>
            </div>
            <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                Generate Bios
            </button>
        </form>
        <div id="results" class="mt-6 space-y-4 hidden">
            <h2 class="text-xl font-bold">Generated Bios:</h2>
            <div id="bioOutput" class="space-y-3"></div>
            <button id="buyButton" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500">
                Unlock All Bios ($4.99)
            </button>
        </div>
    </div>
    <script>
        document.getElementById('bioForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const keywords = document.getElementById('keywords').value;
            // In a real app, this would call a backend API.
            // For this static demo, simulate a response.
            document.getElementById('bioOutput').innerHTML = `
                <p class="bg-gray-100 p-3 rounded">✨ Wanderlust, coffee & dreams. Documenting life's adventures 🌍</p>
                <p class="bg-gray-100 p-3 rounded">🍽️ Foodie | Travel | Lifestyle creator. Let's explore the world, one bite at a time! ✈️</p>
                <p class="text-gray-500 mt-2">More variations available after purchase!</p>
            `;
            document.getElementById('results').classList.remove('hidden');
        });
        document.getElementById('buyButton').addEventListener('click', () => {
            alert('Redirecting to secure payment (Stripe) to unlock all bios!');
            // Implement Stripe redirection here
        });
    </script>
</body>
</html>
