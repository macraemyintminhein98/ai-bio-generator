<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>AI Bio Generator</title><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css"><style>body{display:flex;flex-direction:column;min-height:100vh;}main{flex-grow:1;}footer{padding:1rem 0;text-align:center;}</style></head><body><main class="container"><hgroup><h1>AI Bio Generator</h1><h2>Craft your perfect Instagram bio instantly.</h2></hgroup><form id="bioForm"><label for="keywords">Keywords:</label><input type="text" id="keywords" placeholder="e.g., travel, foodie, adventurer" required><label for="tone">Tone:</label><select id="tone" required><option value="professional">Professional</option><option value="funny">Funny</option><option value="aesthetic">Aesthetic</option><option value="quirky">Quirky</option></select><button type="submit">Generate Bio</button></form><article id="outputCard" style="display:none;"><header>Generated Instagram Bio:</header><p id="generatedBio"></p><button onclick="copyBio()">Copy Bio</button></article></main><footer><small>Powered by AI &copy; 2023</small></footer><script>async function generateBio(event){event.preventDefault();document.getElementById('outputCard').style.display='none';const keywords=document.getElementById('keywords').value;const tone=document.getElementById('tone').value;try{const response=await fetch('/api/generate-bio',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({keywords,tone})});if(!response.ok)throw new Error('Bio generation failed.');const data=await response.json();document.getElementById('generatedBio').innerText=data.bio;document.getElementById('outputCard').style.display='block';}catch(error){alert('Error generating bio: '+error.message);}}function copyBio(){const bioText=document.getElementById('generatedBio');navigator.clipboard.writeText(bioText.innerText).then(()=>{alert('Bio copied to clipboard!');}).catch(err=>{console.error('Could not copy text: ',err);});}document.getElementById('bioForm').addEventListener('submit',generateBio);</script></body></html>
