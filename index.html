<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioGenie</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-purple-600 to-indigo-800 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-2xl p-8 max-w-lg w-full transform transition-all duration-300 hover:scale-105">
        <h1 class="text-4xl font-bold text-center text-gray-900 mb-6">BioGenie ✨</h1>
        <p class="text-center text-gray-600 mb-8">Craft your perfect Instagram bio, instantly!</p>

        <div id="payment-section">
            <p class="text-center text-lg text-gray-800 mb-4">Unlock unlimited bios for just $<span id="price-display">4.99</span>!</p>
            <form id="checkout-form">
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50">
                    Buy BioGenie
                </button>
            </form>
        </div>

        <div id="generator-section" class="hidden">
            <input type="text" id="keywords" placeholder="e.g. photographer, traveler, foodie" class="w-full p-3 border border-gray-300 rounded-lg mb-4 focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            <button id="generateBtn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-opacity-50 mb-6">
                Generate Bios
            </button>
            <div id="output" class="bg-gray-100 p-4 rounded-lg min-h-[150px] relative">
                <p id="placeholder" class="text-gray-500 italic text-center">Your amazing bios will appear here!</p>
            </div>
        </div>
    </div>

    <script src="https://js.stripe.com/v3/"></script>
    <script>
        const price = 4.99;
        document.getElementById('price-display').innerText = price.toFixed(2);

        const stripe = Stripe('YOUR_STRIPE_PUBLIC_KEY'); // Replace with your actual public key

        document.getElementById('checkout-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const response = await fetch('/api/checkout-session', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ price: price * 100 })
            });
            const session = await response.json();
            if (session.id) {
                stripe.redirectToCheckout({ sessionId: session.id });
            }
        });

        // Simulate successful payment for demonstration
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('payment_status') === 'success') {
            document.getElementById('payment-section').classList.add('hidden');
            document.getElementById('generator-section').classList.remove('hidden');
        }

        document.getElementById('generateBtn').addEventListener('click', async () => {
            const keywords = document.getElementById('keywords').value;
            const outputDiv = document.getElementById('output');
            const placeholder = document.getElementById('placeholder');
            outputDiv.innerHTML = '<p class="text-center text-gray-500">Generating...</p>';

            try {
                const response = await fetch('/api/generate-bio', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ keywords })
                });
                const data = await response.json();
                if (data.bios) {
                    outputDiv.innerHTML = data.bios.map(bio => `<p class="mb-2 p-2 bg-white rounded-md shadow-sm">${bio}</p>`).join('');
                } else if (data.error) {
                    outputDiv.innerHTML = `<p class="text-red-500 italic text-center">Error: ${data.error}</p>`;
                } else {
                    outputDiv.innerHTML = `<p class="text-gray-500 italic text-center">No bios generated. Try again!</p>`;
                }
            } catch (error) {
                outputDiv.innerHTML = `<p class="text-red-500 italic text-center">Network error. Please try again.</p>`;
            }
        });
    </script>
</body>
</html>
