<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioGenius AI</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { background-color: #f7fafc; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">
    <h1 class="text-4xl font-bold mb-6 text-gray-800">BioGenius AI</h1>
    <p class="text-xl mb-8 text-gray-600 text-center">Craft your perfect Instagram bio, instantly.</p>
    
    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
        <form id="bio-form" class="space-y-4">
            <div>
                <label for="keywords" class="block text-sm font-medium text-gray-700">Keywords (e.g., photographer, travel):</label>
                <input type="text" id="keywords" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2" placeholder="photographer, travel" required>
            </div>
            <div>
                <label for="tone" class="block text-sm font-medium text-gray-700">Desired Tone:</label>
                <select id="tone" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
                    <option value="witty">Witty</option>
                    <option value="inspirational">Inspirational</option>
                    <option value="minimalist">Minimalist</option>
                    <option value="funny">Funny</option>
                </select>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded-md hover:bg-blue-700 font-medium">Generate Bios</button>
        </form>

        <div id="results" class="mt-6 space-y-4 hidden">
            <h2 class="text-2xl font-bold text-gray-800">Your New Bios:</h2>
            <!-- Bios will be injected here by JS -->
        </div>
    </div>

    <script src="https://js.stripe.com/v3/"></script>
    <script>
        document.getElementById('bio-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const keywords = document.getElementById('keywords').value;
            const tone = document.getElementById('tone').value;
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<h2 class="text-2xl font-bold text-gray-800">Your New Bios:</h2><p class="text-gray-500">Generating options...</p>';
            resultsDiv.classList.remove('hidden');

            try {
                // In a real app, this would trigger a payment and then fetch bios from your backend.
                // For this example, we'll simulate it.
                const response = await fetch('/api/generate-bios', { // Placeholder API endpoint
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ keywords, tone })
                });
                const data = await response.json();

                if (data.bios) {
                    resultsDiv.innerHTML = '<h2 class="text-2xl font-bold text-gray-800">Your New Bios:</h2>' +
                                         data.bios.map(bio => `<p class="bg-gray-100 p-3 rounded">${bio}</p>`).join('');
                } else if (data.error) {
                    resultsDiv.innerHTML = `<h2 class="text-2xl font-bold text-gray-800">Error:</h2><p class="text-red-500">${data.error}</p>`;
                } else {
                    resultsDiv.innerHTML = `<h2 class="text-2xl font-bold text-gray-800">Error:</h2><p class="text-red-500">Failed to generate bios. Please try again.</p>`;
                }

            } catch (error) {
                resultsDiv.innerHTML = `<h2 class="text-2xl font-bold text-gray-800">Error:</h2><p class="text-red-500">An unexpected error occurred: ${error.message}</p>`;
            }
        });

        // Simulate backend API for payment and bio generation in a real product
        // A real implementation would involve Stripe and a server-side API call to OpenAI/similar AI.
        // The above fetch('/api/generate-bios') call would first go to a Stripe checkout.
    </script>
</body>
</html>
