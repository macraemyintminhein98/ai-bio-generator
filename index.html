<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Bio Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; }
        .container { max-width: 768px; }
        textarea { resize: vertical; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <div class="container bg-white shadow-lg rounded-lg p-6 space-y-6">
        <h1 class="text-3xl font-bold text-center text-gray-800">🌟 AI Bio Generator 🌟</h1>
        <p class="text-center text-gray-600">Craft the perfect Instagram bio with AI!</p>
        
        <div class="space-y-4">
            <div>
                <label for="keywords" class="block text-sm font-medium text-gray-700">Keywords (comma-separated):</label>
                <input type="text" id="keywords" class="mt-1 block w-full p-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500" placeholder="e.g., travel, foodie, entrepreneur">
            </div>
            
            <div>
                <label for="tone" class="block text-sm font-medium text-gray-700">Tone:</label>
                <select id="tone" class="mt-1 block w-full p-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                    <option value="professional">Professional</option>
                    <option value="funny">Funny</option>
                    <option value="quirky">Quirky</option>
                    <option value="inspirational">Inspirational</option>
                    <option value="casual">Casual</option>
                </select>
            </div>
            
            <button id="generateBtn" class="w-full py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                Generate Bio
            </button>
        </div>

        <div id="result" class="mt-6 bg-blue-50 p-4 rounded-md hidden">
            <h2 class="text-lg font-semibold text-blue-800 mb-2">Generated Bio:</h2>
            <textarea id="generatedBioText" readonly class="w-full p-2 border border-blue-200 rounded-md bg-white text-blue-900 focus:outline-none" rows="4"></textarea>
            <button onclick="copyBio()" class="mt-2 w-full py-2 px-4 border border-blue-300 rounded-md shadow-sm text-sm font-medium text-blue-700 bg-blue-100 hover:bg-blue-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">Copy Bio</button>
        </div>

        <div class="mt-8 text-center">
            <button id="buyNowBtn" class="w-auto py-3 px-6 border border-transparent rounded-md shadow-lg text-lg font-semibold text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500">Buy Now for $9.99</button>
        </div>

    </div>

    <script>
        document.getElementById('generateBtn').addEventListener('click', async () => {
            const keywords = document.getElementById('keywords').value;
            const tone = document.getElementById('tone').value;
            
            // Simulate API call for now
            document.getElementById('generatedBioText').value = `
Hello there! 👋 I'm passionate about ${keywords || 'life'}. 
${tone === 'professional' ? 'Dedicated to growth and innovation.' : ''}
${tone === 'funny' ? 'Warning: May spontaneously start talking about snacks.' : ''}
${tone === 'quirky' ? 'Collecting moments, not things (and maybe a few quirky socks).' : ''}
${tone === 'inspirational' ? 'Dream big, work hard, stay humble.' : ''}
${tone === 'casual' ? 'Just living my best life. ✨' : ''}
#BioGeneratedByAI
            `.trim();
            document.getElementById('result').classList.remove('hidden');
        });

        function copyBio() {
            const bioText = document.getElementById('generatedBioText');
            bioText.select();
            document.execCommand('copy');
            alert('Bio copied to clipboard!');
        }

        document.getElementById('buyNowBtn').addEventListener('click', () => {
            alert('Redirecting to secure checkout for $9.99... (Stripe integration coming soon!)');
            // In a real app, this would initiate a Stripe checkout session.
        });
    </script>
</body>
</html>
