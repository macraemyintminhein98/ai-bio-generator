<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioBoost - AI Instagram Bio Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0f2f5; }
        .container { max-width: 800px; }
        textarea { resize: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="container bg-white p-8 rounded-lg shadow-md w-full">
        <h1 class="text-4xl font-bold text-center mb-6 text-gray-800">BioBoost</h1>
        <p class="text-center text-gray-600 mb-8">Craft the perfect Instagram bio with AI ✨</p>

        <div class="mb-6">
            <label for="interests" class="block text-sm font-medium text-gray-700 mb-2">Interests/Keywords (e.g., tech, travel, foodie)</label>
            <input type="text" id="interests" class="w-full p-3 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500" placeholder="e.g., entrepreneur, digital nomad, coffee lover">
        </div>

        <div class="mb-6">
            <label for="tone" class="block text-sm font-medium text-gray-700 mb-2">Desired Tone</label>
            <select id="tone" class="w-full p-3 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                <option value="friendly">Friendly</option>
                <option value="professional">Professional</option>
                <option value="witty">Witty</option>
                <option value="inspirational">Inspirational</option>
            </select>
        </div>

        <button id="generateBtn" class="w-full bg-blue-600 text-white p-3 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50 mb-6">Generate Bio</button>

        <div id="outputSection" class="hidden">
            <label for="generatedBio" class="block text-sm font-medium text-gray-700 mb-2">Your AI-Generated Bio:</label>
            <textarea id="generatedBio" rows="4" class="w-full p-3 border border-gray-300 rounded-md bg-gray-50 focus:outline-none" readonly></textarea>
            <button id="copyBtn" class="mt-4 bg-green-500 text-white p-2 rounded-md hover:bg-green-600 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-opacity-50">Copy Bio</button>
        </div>
        
        <div class="mt-8 text-center text-gray-500 text-sm">
            Powered by APEX
        </div>
    </div>

    <script>
        document.getElementById('generateBtn').addEventListener('click', async () => {
            // In a real app, this would make an API call to a backend that uses AI
            const interests = document.getElementById('interests').value;
            const tone = document.getElementById('tone').value;
            const generatedBioField = document.getElementById('generatedBio');
            const outputSection = document.getElementById('outputSection');

            // Simulate AI generation
            const sampleBios = {
                'friendly': `Lover of ${interests || 'life'} ✨ | Spreading good vibes, one post at a time. | Coffee enthusiast ☕`, 
                'professional': `Professionally navigating ${interests || 'my field'} | Building, learning, growing. | Connect with me!`, 
                'witty': `My life is 90% coffee, 10% ${interests || 'chaos'}. | Trying to be a rainbow in someone's cloud. 🌈`, 
                'inspirational': `Inspiring daily through ${interests || 'my journey'}. | Believe in yourself & shine. ✨ | Dream big, work hard.`
            };
            
            generatedBioField.value = sampleBios[tone] || 'Your awesome AI-generated bio will appear here.';
            outputSection.classList.remove('hidden');

            // In a real scenario, after generation, we'd prompt for payment for full access/
            // If payment isn't handled yet, you'd integrate Stripe here.
        });

        document.getElementById('copyBtn').addEventListener('click', () => {
            const generatedBioField = document.getElementById('generatedBio');
            generatedBioField.select();
            document.execCommand('copy');
            alert('Bio copied to clipboard!');
        });
    </script>
</body>
</html>
