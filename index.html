<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>AI Bio Generator</title><style>body{font-family:sans-serif;margin:20px;background:#f4f4f4;color:#333}#app{background:#fff;padding:20px;border-radius:8px;max-width:600px;margin:30px auto;box-shadow:0 0 10px rgba(0,0,0,.1)}h1{color:#007bff;text-align:center}label{display:block;margin-bottom:8px;font-weight:bold}input,select,textarea{width:calc(100% - 22px);padding:10px;margin-bottom:15px;border:1px solid #ddd;border-radius:4px}button{background:#007bff;color:#fff;padding:12px 20px;border:none;border-radius:4px;cursor:pointer;font-size:16px}button:hover{background:#0056b3}#bioOutput{margin-top:20px;padding:15px;background:#e9ecef;border-radius:4px;border:1px solid #ced4da;min-height:80px}</style></head><body><div id="app"><h1>AI Instagram Bio Generator</h1><p>Craft the perfect bio with AI!</p><label for="keywords">Keywords (e.g., photographer, traveler):</label><input type="text" id="keywords" placeholder="adventure, creative, dog lover"><label for="tone">Tone:</label><select id="tone"><option value="witty">Witty</option><option value="professional">Professional</option><option value="inspiring">Inspiring</option><option value="friendly">Friendly</option></select><button onclick="generateBio()">Generate Bio</button><div id="bioOutput">Your generated bio will appear here.</div><p style="text-align:center;margin-top:20px;">Secure payment via Stripe</p></div><script>async function generateBio(){const keywords=document.getElementById('keywords').value;const tone=document.getElementById('tone').value;document.getElementById('bioOutput').innerText='Generating bio...';try{const response=await fetch('/api/generate-bio',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({keywords,tone})});if(!response.ok)throw new Error(`HTTP error! Status: ${response.status}`);const data=await response.json();document.getElementById('bioOutput').innerText=data.bio;}catch(error){console.error('Error generating bio:',error);document.getElementById('bioOutput').innerText='Error generating bio. Please try again later.';}}</script></body></html>
