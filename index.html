<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Bio Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        .max-w-md {
            max-width: 28rem;
        }
    </style>
</head>
<body class="bg-gradient-to-r from-purple-400 via-pink-500 to-red-500 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-2xl p-8 max-w-md w-full text-center">
        <h1 class="text-4xl font-bold text-gray-800 mb-4">BioGenie ✨</h1>
        <p class="text-gray-600 mb-8">Craft your perfect Instagram bio with AI.</p>
        
        <div id="landing-page">
            <p class="text-lg text-gray-700 mb-6">Ready to stand out?</p>
            <button id="get-started-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-full text-lg transition duration-300 ease-in-out transform hover:scale-105">
                Get Your AI Bio <span class="ml-2">🚀</span>
            </button>
            <p class="text-sm text-gray-500 mt-4">First bio for free, then just $9.99 for unlimited!</p>
        </div>

        <div id="generation-page" class="hidden">
            <textarea id="bio-input" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 mb-4" rows="4" placeholder="Tell us about yourself: interests, profession, mood, keywords..."></textarea>
            <button id="generate-btn" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-full text-lg mb-4">Generate Bio</button>
            
            <div id="generated-bio-container" class="mt-6 p-4 bg-gray-100 border border-gray-200 rounded-lg text-left hidden">
                <p id="generated-bio" class="text-gray-800 text-lg mb-3"></p>
                <button id="copy-btn" class="bg-yellow-500 hover:bg-yellow-600 text-white font-semibold py-2 px-4 rounded-full text-sm">Copy to Clipboard</button>
            </div>
            <button id="pay-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-full text-lg mt-6 hidden">Unlock Unlimited Bios ($9.99)</button>
        </div>

        <div class="mt-8 text-gray-500 text-sm">
            &copy; 2023 BioGenie APEX Product. All rights reserved.
        </div>
    </div>
    
    <script>
        document.getElementById('get-started-btn').addEventListener('click', function() {
            document.getElementById('landing-page').classList.add('hidden');
            document.getElementById('generation-page').classList.remove('hidden');
        });

        document.getElementById('generate-btn').addEventListener('click', function() {
            const input = document.getElementById('bio-input').value;
            // In a real app, this would call an API.
            document.getElementById('generated-bio').textContent = `AI Magic! ✨ ${input.length > 5 ? 'A fantastic bio crafted just for you based on: '+ input : 'Your new bio is here!'}`;
            document.getElementById('generated-bio-container').classList.remove('hidden');
            document.getElementById('pay-btn').classList.remove('hidden');
        });

        document.getElementById('copy-btn').addEventListener('click', function() {
            const bioText = document.getElementById('generated-bio').textContent;
            navigator.clipboard.writeText(bioText).then(() => {
                alert('Bio copied to clipboard!');
            }).catch(err => {
                console.error('Failed to copy text: ', err);
            });
        });

        document.getElementById('pay-btn').addEventListener('click', function() {
            alert('Redirecting to secure payment... (Stripe integration would go here)');
            // window.location.href = '/checkout/stripe-link';
        });
    </script>
</body>
</html>
