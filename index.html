<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Bio Generator</title>
    <style>
        body { font-family: sans-serif; margin: 2em; line-height: 1.6; background-color: #f4f4f4; color: #333; }
        h1 { color: #333; text-align: center; margin-bottom: 1em; }
        .container { max-width: 700px; margin: auto; background: #fff; padding: 2em; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        label { display: block; margin-bottom: 0.5em; font-weight: bold; }
        input[type="text"], select, textarea { width: calc(100% - 20px); padding: 10px; margin-bottom: 1em; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 12px 20px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 1em; width: 100%; }
        button:hover { background-color: #0056b3; }
        #output { margin-top: 2em; padding: 1em; background-color: #e9ecef; border-radius: 4px; white-space: pre-wrap; word-wrap: break-word; }
        .price { text-align: center; margin-top: 1.5em; font-size: 1.2em; font-weight: bold; color: #d63384; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Craft Your Perfect Instagram Bio with AI!</h1>
        <p>Enter your details and let our AI generate amazing bios for you.</p>
        <form id="bioForm">
            <label for="keywords">Keywords (comma-separated):</label>
            <input type="text" id="keywords" placeholder="e.g., travel, photography, food, entrepreneur" required>

            <label for="tone">Preferred Tone:</label>
            <select id="tone" required>
                <option value="">Select Tone</option>
                <option value="professional">Professional</option>
                <option value="funny">Funny</option>
                <option value="quirky">Quirky</option>
                <option value="inspirational">Inspirational</option>
                <option value="casual">Casual</option>
            </select>

            <label for="emoji">Emoji Preference:</label>
            <select id="emoji" required>
                <option value="yes">Use Emojis</option>
                <option value="no">No Emojis</option>
                <option value="moderate">Moderate Emojis</option>
            </select>
            
            <p class="price">Price: $9.99 per generation</p>
            <button type="submit">Generate Bios</button>
        </form>
        <div id="output"></div>
    </div>

    <script>
        document.getElementById('bioForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const keywords = document.getElementById('keywords').value;
            const tone = document.getElementById('tone').value;
            const emoji = document.getElementById('emoji').value;

            document.getElementById('output').innerText = 'Generating your bios... please wait.';

            // In a real application, this would send data to a backend via fetch and handle payment.
            // For this static demo, we simulate a response.
            setTimeout(() => {
                const dummyBios = [
                    `Wanderlust-infused 🌍 | Capturing moments, one click at a time 📸 | Foodie adventures & good vibes ✨`,
                    `Professional storyteller | Helping brands shine ✨ | Coffee in one hand, dreams in the other ☕`,
                    `Just a human being | Trying to do good | And maybe make you smile 😄`
                ];
                document.getElementById('output').innerHTML = dummyBios.map(bio => `<p>${bio}</p>`).join('<hr>');
            }, 2000);
        });
    </script>
</body>
</html>
