<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Instagram Bio Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; }
        .container { max-width: 768px; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="container bg-white p-8 rounded-lg shadow-md w-full">
        <h1 class="text-3xl font-bold text-center mb-6 text-gray-800">AI Instagram Bio Generator</h1>
        <p class="text-center text-gray-600 mb-8">Craft the perfect Instagram bio with AI!</p>
        <div class="mb-6">
            <label for="keywords" class="block text-gray-700 text-sm font-bold mb-2">Keywords (e.g., travel, foodie, adventurer):</label>
            <input type="text" id="keywords" class="shadow appearance-none border rounded w-full py-3 px-4 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" placeholder="Enter keywords, separated by commas">
        </div>
        <button id="generateBtn" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded focus:outline-none focus:shadow-outline w-full mb-6">
            Generate Bio
        </button>
        <div id="results" class="bg-gray-100 p-4 rounded-md hidden">
            <h2 class="text-xl font-semibold mb-3 text-gray-800">Your AI-Generated Bios:</h2>
            <div id="bioOutput" class="space-y-3 text-gray-700"></div>
        </div>
        <div class="text-center mt-8 text-gray-500 text-sm">
            <p>&copy; 2023 APEX. All rights reserved.</p>
        </div>
    </div>
    <script>
        document.getElementById('generateBtn').addEventListener('click', async () => {
            const keywords = document.getElementById('keywords').value;
            if (!keywords) {
                alert('Please enter some keywords.');
                return;
            }
            document.getElementById('generateBtn').textContent = 'Generating...';
            document.getElementById('generateBtn').disabled = true;
            try {
                // Placeholder for actual API call
                const response = await fetch('/api/generate-bio', { 
                  method: 'POST', 
                  headers: { 'Content-Type': 'application/json' }, 
                  body: JSON.stringify({ keywords }) 
                });
                if (!response.ok) throw new Error('API request failed');
                const data = await response.json();
                const bioOutput = document.getElementById('bioOutput');
                bioOutput.innerHTML = '';
                data.bios.forEach(bio => {
                    const bioDiv = document.createElement('div');
                    bioDiv.className = 'p-3 bg-white border border-gray-200 rounded flex justify-between items-center';
                    bioDiv.innerHTML = `<span>${bio}</span><button onclick="navigator.clipboard.writeText('${bio.replace(/'/g, "\'")}')" class="ml-4 text-blue-500 hover:text-blue-700 text-sm">Copy</button>`;
                    bioOutput.appendChild(bioDiv);
                });
                document.getElementById('results').classList.remove('hidden');
            } catch (error) {
                console.error('Error generating bio:', error);
                alert('Failed to generate bio. Please try again.');
            } finally {
                document.getElementById('generateBtn').textContent = 'Generate Bio';
                document.getElementById('generateBtn').disabled = false;
            }
        });
    </script>
</body>
</html>
