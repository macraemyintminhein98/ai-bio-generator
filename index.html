<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioGenAI - AI Instagram Bio Generator</title>
    <meta name="description" content="Generate creative and engaging Instagram bios instantly with AI.">
    <link href="https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-md max-w-md w-full text-center">
        <h1 class="text-3xl font-bold mb-4">BioGenAI</h1>
        <p class="text-gray-600 mb-6">Craft your perfect Instagram bio with AI!</p>
        <form id="bioForm" class="space-y-4">
            <div>
                <input type="text" id="keywords" placeholder="Keywords (e.g., travel, food, tech)" class="w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <select id="tone" class="w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="funny">Funny</option>
                    <option value="professional">Professional</option>
                    <option value="inspiring">Inspiring</option>
                    <option value="creative">Creative</option>
                </select>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded-md hover:bg-blue-700 transition duration-200">Generate Bio</button>
        </form>
        <div id="result" class="mt-6 p-4 bg-gray-50 border border-gray-200 rounded-md text-left hidden">
            <h2 class="font-semibold mb-2">Your AI-Generated Bio:</h2>
            <p id="bioText" class="whitespace-pre-wrap text-gray-800"></p>
            <button id="copyBtn" class="mt-4 bg-green-500 text-white p-2 rounded-md hover:bg-green-600 transition duration-200 text-sm">Copy Bio</button>
        </div>
        <p class="mt-8 text-sm text-gray-500">Powered by APEX AI. Only $4.99 per pack!</p>
    </div>
    <script>
        const form = document.getElementById('bioForm');
        const keywordsInput = document.getElementById('keywords');
        const toneSelect = document.getElementById('tone');
        const resultDiv = document.getElementById('result');
        const bioText = document.getElementById('bioText');
        const copyBtn = document.getElementById('copyBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const keywords = keywordsInput.value;
            const tone = toneSelect.value;
            // In a real app, this would hit a backend API
            bioText.textContent = `[AI-generated bio for Keywords: ${keywords}, Tone: ${tone}.]
            ✨ Living my best life | Exploring the world one step at a time! 📍 Your City Name ✉️ Reach out for collabs!`;
            resultDiv.classList.remove('hidden');
        });

        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(bioText.textContent);
            alert('Bio copied to clipboard!');
        });
    </script>
</body>
</html>
