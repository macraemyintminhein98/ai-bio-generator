<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioGenius AI</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-500 to-purple-600 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-lg shadow-xl p-8 max-w-lg w-full text-center">
        <h1 class="text-4xl font-bold text-gray-800 mb-4">BioGenius AI</h1>
        <p class="text-lg text-gray-600 mb-8">Craft the perfect Instagram bio with AI!</p>
        
        <form id="bioForm" class="space-y-4">
            <input type="text" id="keywords" placeholder="Keywords (e.g., 'travel blogger', 'foodie')" class="w-full p-3 border border-gray-300 rounded-md focus:ring-2 focus:ring-purple-500 focus:border-transparent transition duration-200">
            <textarea id="niche" placeholder="Tell us about your niche (e.g., 'sharing vegan recipes', 'adventure photography')" rows="3" class="w-full p-3 border border-gray-300 rounded-md focus:ring-2 focus:ring-purple-500 focus:border-transparent transition duration-200"></textarea>
            <button type="submit" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-4 rounded-md transition duration-300">Generate My Bio</button>
        </form>

        <div id="result" class="mt-8 p-4 bg-gray-100 border border-gray-200 rounded-md text-left hidden">
            <h2 class="text-xl font-semibold text-gray-700 mb-2">Your AI-Powered Bio:</h2>
            <p id="bioOutput" class="text-gray-800 break-words whitespace-pre-wrap"></p>
            <button id="copyBtn" class="mt-4 bg-purple-500 hover:bg-purple-600 text-white text-sm py-2 px-3 rounded-md transition duration-300">Copy Bio</button>
        </div>

        <p class="text-sm text-gray-500 mt-8">Powered by intelligent AI. Try it now for just $9.99!</p>
    </div>

    <script>
        document.getElementById('bioForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const keywords = document.getElementById('keywords').value;
            const niche = document.getElementById('niche').value;

            // Simulate AI generation
            const loadingText = "Generating your perfect bio...";
            document.getElementById('bioOutput').textContent = loadingText;
            document.getElementById('result').classList.remove('hidden');

            setTimeout(() => {
                const generatedBio = `✨ ${keywords ? keywords.split(',')[0].trim() : 'Creator'} | ${niche || 'Digital Enthusiast'} ✨\nCapturing moments & sharing my passion. Let's connect! 👇`;
                document.getElementById('bioOutput').textContent = generatedBio;
            }, 1500); // Simulate API call delay
        });

        document.getElementById('copyBtn').addEventListener('click', () => {
            const bioText = document.getElementById('bioOutput').textContent;
            navigator.clipboard.writeText(bioText).then(() => {
                alert('Bio copied to clipboard!');
            }).catch(err => {
                console.error('Failed to copy bio: ', err);
            });
        });
    </script>
</body>
</html>
