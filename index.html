<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Bio Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; }
        .container { max-width: 768px; margin: 0 auto; padding: 2rem; }
        textarea { resize: vertical; min-height: 100px; }
    </style>
</head>
<body class="bg-gray-100 text-gray-900">
    <div class="container bg-white shadow-lg rounded-lg mt-10">
        <h1 class="text-4xl font-bold text-center mb-6">Craft Your Perfect Bio</h1>
        <p class="text-center text-gray-600 mb-8">Generate engaging Instagram bios with AI.</p>
        <div class="mb-4">
            <label for="keywords" class="block text-sm font-medium text-gray-700">Keywords (e.g., travel, foodie):</label>
            <input type="text" id="keywords" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
        </div>
        <div class="mb-6">
            <label for="tone" class="block text-sm font-medium text-gray-700">Tone:</label>
            <select id="tone" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
                <option>Professional</option>
                <option>Funny</option>
                <option>Aesthetic</option>
                <option>Adventurous</option>
                <option>Creative</option>
            </select>
        </div>
        <button id="generateBtn" class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition">Generate Bio</button>
        
        <div id="results" class="mt-8 border-t pt-6 hidden">
            <h2 class="text-2xl font-bold mb-4">Your Bio Options:</h2>
            <div id="bioOutput" class="space-y-4">
                <!-- Generated bios will appear here -->
            </div>
        </div>
    </div>
    <script>
        document.getElementById('generateBtn').addEventListener('click', async () => {
            const keywords = document.getElementById('keywords').value;
            const tone = document.getElementById('tone').value;
            const bioOutput = document.getElementById('bioOutput');
            const resultsSection = document.getElementById('results');
            
            // Simulate API call and generation
            bioOutput.innerHTML = '<p class="text-center text-gray-500">Generating...</p>';
            resultsSection.classList.remove('hidden');

            await new Promise(resolve => setTimeout(resolve, 1500)); // Simulate loading

            const generatedBios = [
                `Blogger. Creator. Living my best life. ${keywords}, with a ${tone} twist. ✨`,
                `Exploring the world one byte at a time. Digital nomad with a ${tone} vibe and a passion for ${keywords}.`,
                `Fueled by coffee and good intentions. Spreading ${tone} vibes and ${keywords} adventures. Let's connect! 🔥`
            ];

            bioOutput.innerHTML = generatedBios.map(bio => `
                <div class="p-4 border rounded-md bg-gray-50 flex justify-between items-center">
                    <p class="flex-grow">${bio}</p>
                    <button class="ml-4 text-blue-500 hover:text-blue-700 copy-btn" data-bio="${bio}">Copy</button>
                </div>
            `).join('');

            document.querySelectorAll('.copy-btn').forEach(button => {
                button.addEventListener('click', (e) => {
                    navigator.clipboard.writeText(e.target.dataset.bio);
                    alert('Bio copied!');
                });
            });
        });
    </script>
</body>
</html>
