<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioGenie - AI Instagram Bio Generator</title>
    <meta name="description" content="Generate creative, personalized Instagram bios instantly.">
    <link href="https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-r from-purple-400 via-pink-500 to-red-500 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-lg shadow-xl p-8 max-w-md w-full text-center">
        <h1 class="text-4xl font-bold text-gray-800 mb-4">BioGenie ✨</h1>
        <p class="text-lg text-gray-600 mb-6">Craft your perfect Instagram bio with AI!</p>
        <form action="/generate-bio" method="POST" class="space-y-4">
            <input type="text" name="keywords" placeholder="Keywords (e.g., travel, foodie, tech)" class="w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-purple-500">
            <select name="tone" class="w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-purple-500">
                <option value="">Select Tone</option>
                <option value="funny">Funny</option>
                <option value="professional">Professional</option>
                <option value="inspirational">Inspirational</option>
                <option value="playful">Playful</option>
            </select>
            <input type="text" name="emoji_pref" placeholder="Emoji preferences (e.g., 🚀🌟)" class="w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-purple-500">
            <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded-md font-semibold hover:bg-blue-700 transition duration-300 ease-in-out">
                Generate My Bio!
            </button>
        </form>
        <p class="mt-6 text-gray-500 text-sm">Powered by intelligent AI. Results may vary.</p>
        <p class="mt-2 text-gray-400 text-xs">Click 'Generate My Bio!' to unlock options. Pricing on next step.</p>
    </div>
</body>
</html>
