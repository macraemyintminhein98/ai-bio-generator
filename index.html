<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioBoost AI</title>
    <meta name="description" content="Generate creative Instagram bios with AI.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .cta-btn { background-color: #6366f1; color: white; padding: 0.75rem 1.5rem; border-radius: 0.5rem; text-decoration: none; font-weight: 600; transition: background-color 0.3s; }
        .cta-btn:hover { background-color: #4f46e5; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white shadow-xl rounded-lg p-8 max-w-md w-full text-center">
        <h1 class="text-4xl font-bold text-gray-900 mb-4">BioBoost AI</h1>
        <p class="text-lg text-gray-700 mb-6">Craft the perfect Instagram bio, effortlessly.</p>
        <p class="text-md text-gray-600 mb-8">Simply enter keywords and let our AI generate engaging bios that capture your essence.</p>
        <form action="#" method="POST" class="space-y-4">
            <input type="text" placeholder="Keywords (e.g., photographer, travel, foodie)" class="w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500" required>
            <textarea placeholder="Optional: Tell us more about yourself" rows="3" class="w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
            <button type="submit" class="cta-btn w-full">Generate My Bio!</button>
        </form>
        <p class="mt-8 text-sm text-gray-500">&copy; 2023 BioBoost AI. All rights reserved.</p>
    </div>
</body>
</html>
