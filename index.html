<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioGenie - AI Instagram Bio Generator</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='-.1em' x='-.05em' font-size='110' fill='%23000'%3E%F0%9F%AA%84%3C/text%3E%3C/svg%3E">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; }
        #loading { display: none; }
    </style>
</head>
<body class="bg-gradient-to-r from-purple-400 via-pink-500 to-red-500 min-h-screen text-white flex flex-col items-center justify-center p-4">
    <div class="bg-white bg-opacity-20 backdrop-filter backdrop-blur-lg p-8 rounded-xl shadow-lg w-full max-w-md">
        <h1 class="text-4xl font-bold text-center mb-6">BioGenie 🧞‍♀️</h1>
        <p class="text-center mb-8">Craft the perfect Instagram bio with AI!</p>
        <input type="text" id="keywordsInput" placeholder="e.g., photographer, travel, adventure" class="w-full p-3 mb-4 rounded-lg bg-white bg-opacity-30 border border-white border-opacity-50 text-white placeholder-gray-200 focus:outline-none focus:ring-2 focus:ring-white">
        <button id="generateButton" class="w-full bg-white text-pink-600 font-bold py-3 px-4 rounded-lg hover:bg-pink-100 transition duration-300">
            Generate My Bio
        </button>
        <div id="loading" class="text-center mt-4">
            <p>Generating amazing bios...</p>
        </div>
        <div id="biosOutput" class="mt-6 bg-white bg-opacity-20 p-4 rounded-lg" style="min-height: 100px;">
            <p id="placeholderText" class="text-center text-gray-200">Your new bio will appear here!</p>
        </div>
        <button id="copyButton" class="w-full bg-green-500 text-white font-bold py-2 px-4 rounded-lg hover:bg-green-600 transition duration-300 mt-4 hidden">
            Copy Bio
        </button>
        <p class="text-center text-sm mt-6">Ready for unlimited bios? <a href="#" class="underline font-semibold">Upgrade Now</a></p>
    </div>
    <script>
        const keywordsInput = document.getElementById('keywordsInput');
        const generateButton = document.getElementById('generateButton');
        const biosOutput = document.getElementById('biosOutput');
        const loadingIndicator = document.getElementById('loading');
        const placeholderText = document.getElementById('placeholderText');
        const copyButton = document.getElementById('copyButton');

        generateButton.addEventListener('click', async () => {
            const keywords = keywordsInput.value.trim();
            if (!keywords) {
                alert('Please enter some keywords!');
                return;
            }
            placeholderText.style.display = 'none';
            biosOutput.innerHTML = '';
            loadingIndicator.style.display = 'block';
            copyButton.style.display = 'none';

            try {
                // In a real app, this would call an API endpoint (e.g., Vercel Edge Function)
                // For demo, simulate API response
                const simulatedBios = [
                    `📸 Wanderlust-fueled photographer | Exploring the world, one frame at a time | Adventure awaits! ✨`,
                    `📍 Travel enthusiast & storyteller | Capturing life's beautiful moments | Always seeking new horizons ✈️`,
                    `Photographer by passion, adventurer by nature. Creating memories through my lens. Let's connect! 👇`
                ];
                
                await new Promise(resolve => setTimeout(resolve, 2000)); // Simulate API delay
                
                const generatedBio = simulatedBios[Math.floor(Math.random() * simulatedBios.length)];
                biosOutput.innerHTML = `<p class="text-white">${generatedBio}</p>`;
                copyButton.dataset.bio = generatedBio;
                copyButton.style.display = 'block';

            } catch (error) {
                biosOutput.innerHTML = `<p class="text-red-300">Error generating bio. Please try again.</p>`;
            } finally {
                loadingIndicator.style.display = 'none';
            }
        });

        copyButton.addEventListener('click', () => {
            const bioToCopy = copyButton.dataset.bio;
            navigator.clipboard.writeText(bioToCopy).then(() => {
                alert('Bio copied to clipboard!');
            }).catch(err => {
                console.error('Failed to copy text: ', err);
            });
        });
    </script>
</body>
</html>
