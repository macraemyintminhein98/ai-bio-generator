<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioBoost AI</title>
    <meta name="description" content="Generate amazing Instagram bios instantly with AI.">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-r from-purple-400 via-pink-500 to-red-500 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-lg shadow-xl max-w-md w-full text-center">
        <h1 class="text-4xl font-bold text-gray-800 mb-4">BioBoost AI</h1>
        <p class="text-lg text-gray-600 mb-6">Craft your perfect Instagram bio in seconds!</p>
        
        <div class="mb-4">
            <input type="text" placeholder="Keywords (e.g., travel, foodie)" class="w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-pink-400">
        </div>
        <div class="mb-6">
            <select class="w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-pink-400">
                <option>Tone: Professional</option>
                <option>Tone: Funny</option>
                <option>Tone: Aesthetic</option>
                <option>Tone: Quirky</option>
            </select>
        </div>
        
        <button class="bg-pink-500 text-white py-3 px-6 rounded-md hover:bg-pink-600 transition duration-300 ease-in-out text-lg font-semibold">Generate Bio</button>

        <a href="#" class="block mt-6 text-pink-600 hover:underline">See Examples</a>
        <button id="checkout-button" class="mt-4 w-full bg-green-500 text-white py-3 px-6 rounded-md hover:bg-green-600 transition duration-300 ease-in-out text-lg font-semibold">Buy for $4.99</button>
        <script src="https://js.stripe.com/v3/"></script>
        <script>
            const stripe = Stripe('pk_test_TYooMQauvdEDq54NiTGBzqpk'); // Replace with your publishable key
            const checkoutButton = document.getElementById('checkout-button');

            checkoutButton.addEventListener('click', async () => {
                try {
                    const response = await fetch('/create-checkout-session', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ priceId: 'PRICE_ID' }), // Replace with actual price ID
                    });
                    const session = await response.json();

                    const result = await stripe.redirectToCheckout({
                        sessionId: session.id,
                    });

                    if (result.error) {
                        alert(result.error.message);
                    }
                } catch (error) {
                    console.error('Error:', error);
                }
            });
        </script>
    </div>
</body>
</html>
