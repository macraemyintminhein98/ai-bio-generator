<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioBoost AI</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; }
        .container { max-width: 768px; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <div class="container bg-white shadow-lg rounded-lg p-8 space-y-6">
        <h1 class="text-4xl font-bold text-center text-gray-800">BioBoost AI</h1>
        <p class="text-lg text-center text-gray-600">Craft the perfect Instagram bio with AI.<br>Just tell us about yourself!</p>
        
        <div class="space-y-4">
            <div>
                <label for="keywords" class="block text-sm font-medium text-gray-700">Interests, Niche, Tone (e.g., 'tech entrepreneur, funny, dog lover')</label>
                <textarea id="keywords" rows="3" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm" placeholder="e.g., foodie, traveler, witty, dad jokes"></textarea>
            </div>
            <button id="generateBtn" class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition duration-150 ease-in-out">
                Generate My Bio!
            </button>
        </div>

        <div id="results" class="hidden mt-6 space-y-4">
            <h2 class="text-2xl font-semibold text-gray-800">Your AI-Generated Bios:</h2>
            <div id="bioOutput" class="bg-gray-50 p-4 rounded-md border border-gray-200 text-gray-700 whitespace-pre-wrap"></div>
            <button id="copyBtn" class="w-full bg-green-500 text-white py-2 px-4 rounded-md hover:bg-green-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500 transition duration-150 ease-in-out">
                Copy Bio
            </button>
        </div>
        <p class="text-center text-gray-500 text-sm mt-8">Powered by intelligent AI. Get 3 bios for just $9.99!</p>
    </div>

    <script>
        const keywordsInput = document.getElementById('keywords');
        const generateBtn = document.getElementById('generateBtn');
        const resultsDiv = document.getElementById('results');
        const bioOutput = document.getElementById('bioOutput');
        const copyBtn = document.getElementById('copyBtn');

        generateBtn.addEventListener('click', async () => {
            const keywords = keywordsInput.value.trim();
            if (!keywords) {
                alert('Please enter some keywords to generate your bio!');
                return;
            }

            generateBtn.textContent = 'Generating...';
            generateBtn.disabled = true;
            resultsDiv.classList.add('hidden');

            try {
                // In a real product, this would trigger a payment flow then the API call
                // For this example, we simulate a response.
                const simulatedBios = [
                    `Entrepreneur | Dog Lover 🐾 | Coffee Enthusiast ☕ | Spreading positive vibes! ✨`,
                    `Techie by day, foodie by night 🍜 | Building cool stuff & exploring new places. Let's connect!`,
                    `Witty & Unfiltered | Opinions as strong as my espresso. 😉 Living life one adventure at a time.`
                ];
                bioOutput.innerText = simulatedBios.join('\n\n---\n\n');
                resultsDiv.classList.remove('hidden');
            } catch (error) {
                console.error('Error generating bio:', error);
                alert('Failed to generate bio. Please try again later.');
            } finally {
                generateBtn.textContent = 'Generate My Bio!';
                generateBtn.disabled = false;
            }
        });

        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(bioOutput.innerText.replace(/\n\n---\n\n/g, '\n\n'))
                .then(() => alert('Bio copied to clipboard!'))
                .catch(err => console.error('Failed to copy text: ', err));
        });
    </script>
</body>
</html>
