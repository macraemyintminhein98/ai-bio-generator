<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>InstaBio AI</title><link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"></head><body class="bg-gray-100 flex items-center justify-center min-h-screen"><div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md"><h1 class="text-2xl font-bold mb-4 text-center">InstaBio AI</h1><p class="text-gray-600 mb-6 text-center">Get an amazing Instagram bio in seconds!</p><input type="text" id="keywords" placeholder="Keywords (e.g., foodie, traveler)" class="w-full p-2 border border-gray-300 rounded mb-3"><select id="tone" class="w-full p-2 border border-gray-300 rounded mb-4"><option value="humorous">Humorous</option><option value="professional">Professional</option><option value="inspiring">Inspiring</option></select><button id="generate" class="bg-blue-500 text-white p-2 rounded w-full mb-4 hover:bg-blue-600">Generate Bio</button><textarea id="bioOutput" class="w-full p-2 border border-gray-300 rounded h-32 mb-4" readonly placeholder="Your generated bio will appear here..."></textarea><button id="copy" class="bg-green-500 text-white p-2 rounded w-full hover:bg-green-600">Copy to Clipboard</button><script>const bioOutput=document.getElementById('bioOutput');document.getElementById('generate').addEventListener('click',async()=>{const k=document.getElementById('keywords').value,t=document.getElementById('tone').value;bioOutput.value='Generating...';try{const r=await fetch('/api/generate-bio',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({keywords:k,tone:t})});const d=await r.json();bioOutput.value=d.bio}catch(e){bioOutput.value='Error generating bio.'}});document.getElementById('copy').addEventListener('click',()=>{bioOutput.select();navigator.clipboard.writeText(bioOutput.value);alert('Bio copied to clipboard!')});</script></div></body></html>
