<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Bio Generator</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f0f2f5; color: #333; }
        .container { max-width: 600px; margin: 40px auto; padding: 25px; background: white; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: #5a5a5a; margin-bottom: 25px; }
        label { display: block; margin-bottom: 10px; font-weight: bold; text-align: left; }
        textarea { width: calc(100% - 20px); padding: 10px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 5px; min-height: 80px; resize: vertical; }
        button { background-color: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; transition: background-color 0.3s; }
        button:hover { background-color: #0056b3; }
        #result { margin-top: 25px; padding: 15px; background-color: #e9ecef; border-radius: 5px; min-height: 50px; text-align: left; white-space: pre-wrap; word-wrap: break-word; }
        #copyBtn { margin-top: 15px; background-color: #28a745; }
        #copyBtn:hover { background-color: #218838; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Craft Your Perfect Instagram Bio</h1>
        <label for="prompt">Tell us about yourself (e.g., profession, hobbies, vibe):</label>
        <textarea id="prompt" placeholder="e.g., 'Software Engineer, loves hiking and coffee, chill vibes'" rows="4"></textarea>
        <button onclick="generateBio()">Generate Bio</button>
        <div id="result">Your AI-generated bio will appear here!</div>
        <button id="copyBtn" onclick="copyBio()" style="display: none;">Copy Bio</button>
    </div>

    <script>
        async function generateBio() {
            const prompt = document.getElementById('prompt').value;
            const resultDiv = document.getElementById('result');
            const copyBtn = document.getElementById('copyBtn');
            resultDiv.textContent = 'Generating...';
            copyBtn.style.display = 'none';

            // In a real application, this would call a backend API.
            // For this example, we'll simulate a response.
            // Replace with your actual LLM API call (e.g., fetch('/api/generate-bio', { method: 'POST', body: JSON.stringify({ prompt }) }))
            const simulatedResponse = `✨ Building cool things & exploring new trails. Coffee in hand, adventure in heart. Let's connect! 🚀`;
            
            setTimeout(() => {
                resultDiv.textContent = simulatedResponse;
                copyBtn.style.display = 'block';
            }, 1500); // Simulate API delay
        }

        function copyBio() {
            const resultDiv = document.getElementById('result');
            navigator.clipboard.writeText(resultDiv.textContent);
            alert('Bio copied to clipboard!');
        }
    </script>
</body>
</html>
