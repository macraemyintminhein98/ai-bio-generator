<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>InstaBio AI</title><link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✨</text></svg>"><style>body{font-family:sans-serif;margin:0;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background-color:#f0f2f5;color:#333}header{padding:20px;text-align:center}main{background:#fff;padding:40px;border-radius:8px;box-shadow:0 0 15px rgba(0,0,0,.1);max-width:500px;width:90%}h1{color:#6400e2;margin-bottom:20px}p{margin-bottom:25px;line-height:1.6}input[type="text"],select,textarea{width:calc(100% - 20px);padding:10px;margin-bottom:15px;border:1px solid #ccc;border-radius:4px}button{background-color:#6400e2;color:#fff;padding:12px 20px;border:none;border-radius:4px;cursor:pointer;font-size:16px;width:100%}button:hover{background-color:#7a1aee}.bio-output{margin-top:20px;padding:15px;background-color:#e9e9e9;border-radius:4px;min-height:80px;white-space:pre-wrap;word-wrap:break-word;font-family:monospace;font-size:1.1em}.loading{color:#6400e2;text-align:center}.price{font-size:1.5em;font-weight:bold;margin-top:20px}</style></head><body><header><h1>✨ InstaBio AI</h1></header><main><p>Craft the perfect Instagram bio with AI. Just tell us what you're about!</p><input type="text" id="keywords" placeholder="Keywords (e.g., travel, foodie, entrepreneur)"><select id="tone"><option value="default">Select Tone</option><option value="funny">Funny</option><option value="professional">Professional</option><option value="aesthetic">Aesthetic</option><option value="inspirational">Inspirational</option></select><div class="price">$4.99 per bio</div><button id="generateBio">Generate Bio</button><div id="output" class="bio-output">Your awesome bio will appear here!</div><div id="loading" class="loading" style="display:none;">Generating...</div></main><script>document.getElementById('generateBio').addEventListener('click', async () => {const keywords = document.getElementById('keywords').value;const tone = document.getElementById('tone').value;const outputDiv = document.getElementById('output');const loadingDiv = document.getElementById('loading');if (!keywords || tone === 'default') {alert('Please enter keywords and select a tone.');return;}loadingDiv.style.display = 'block';outputDiv.textContent = '';try {const response = await fetch('/api/generate-bio', {method: 'POST',headers: {'Content-Type': 'application/json'},body: JSON.stringify({ keywords, tone, price: 4.99 })});const data = await response.json();if (response.ok) {outputDiv.textContent = data.bio;} else {alert(data.error || 'Failed to generate bio.');}} catch (error) {console.error('Error:', error);alert('An unexpected error occurred.');} finally {loadingDiv.style.display = 'none';}});</script></body></html>
