<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioBoost AI - Instagram Bio Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .container { max-width: 800px; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased h-screen flex flex-col justify-between">
    <header class="bg-white shadow p-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-indigo-600">BioBoost AI</h1>
            <nav>
                <a href="#how-it-works" class="text-gray-600 hover:text-indigo-600 px-3 py-2">How it Works</a>
                <a href="#pricing" class="text-gray-600 hover:text-indigo-600 px-3 py-2">Pricing</a>
            </nav>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center py-12 px-4">
        <div class="container mx-auto text-center">
            <h2 class="text-4xl md:text-5xl font-extrabold mb-6 leading-tight">Craft Your Perfect Instagram Bio with AI</h2>
            <p class="text-xl text-gray-600 mb-8 max-w-2xl mx-auto">Input your vibe, keywords, and emojis – get multiple catchy bios in seconds.</p>
            
            <div class="bg-white p-8 rounded-lg shadow-xl border border-indigo-100 max-w-lg mx-auto">
                <form action="#" method="POST">
                    <textarea class="w-full p-3 border border-gray-300 rounded-lg mb-4 focus:ring-2 focus:ring-indigo-500 focus:border-transparent" rows="4" placeholder="Tell us about yourself, your niche, keywords, favorite emojis... (e.g., 'Travel Blogger, adventurous, coffee lover, always exploring ✈️☕')"></textarea>
                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-lg text-lg transition duration-300 ease-in-out transform hover:scale-105">
                        Generate Your Bio Now!
                    </button>
                    <p class="text-sm text-gray-500 mt-4">Secure payment via Stripe. One-time bio generation.</p>
                </form>
            </div>
            
        </div>
    </main>

    <footer class="bg-gray-800 text-white p-4 text-center">
        <p>&copy; 2023 BioBoost AI. All rights reserved.</p>
    </footer>
</body>
</html>
