<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>InstaBio AI</title><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css"><style>body{padding:20px}main{max-width:600px;margin:auto}.output{margin-top:20px;padding:15px;background-color:#f8f9fa;border-radius:5px;border:1px solid #e9ecef}footer{margin-top:40px;text-align:center}</style></head><body><main class="container"><h1>InstaBio AI</h1><p>Craft the perfect Instagram bio with AI – instantly!</p><form id="bioForm"><label for="interests">Interests/Keywords (comma-separated):</label><input type="text" id="interests" name="interests" placeholder="e.g., travel, photography, entrepreneurship" required><label for="tone">Desired Tone:</label><select id="tone" name="tone"><option value="creative">Creative</option><option value="professional">Professional</option><option value="funny">Funny</option><option value="inspirational">Inspirational</option></select><label for="emoji">Include Emojis?</label><input type="checkbox" id="emoji" name="emoji" role="switch"><button type="submit" id="generateBtn">Generate Bio</button></form><article class="output" id="output"><p>Your AI-generated bio will appear here.</p></article><footer><p><a href="#">How It Works</a> | <a href="#">Pricing</a></p></footer></main><script>document.getElementById('bioForm').addEventListener('submit',async(e)=>{e.preventDefault();const generateBtn=document.getElementById('generateBtn');generateBtn.setAttribute('aria-busy','true');generateBtn.textContent='Generating...';const interests=document.getElementById('interests').value;const tone=document.getElementById('tone').value;const emoji=document.getElementById('emoji').checked;'use strict';console.log('Generating bio with:',interests,tone,emoji);const mockBio="✨ Dreamer | Creator | Explorer 📍 Globe-trotter. Lover of coffee & sunsets. Sharing my journey, one post at a time. Let's connect! 👇";document.getElementById('output').innerHTML=`<p>${mockBio}</p>`;generateBtn.removeAttribute('aria-busy');generateBtn.textContent='Generate Bio'});</script></body></html>
