<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Bio Generator</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f0f2f5; margin: 0; }
        .container { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 90%; max-width: 500px; text-align: center; }
        h1 { color: #333; margin-bottom: 20px; }
        label { display: block; margin-top: 15px; margin-bottom: 5px; font-weight: bold; text-align: left; }
        input[type="text"], select { width: calc(100% - 20px); padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px; }
        button { background-color: #007bff; color: white; padding: 12px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%; }
        button:hover { background-color: #0056b3; }
        #results { margin-top: 25px; text-align: left; border-top: 1px solid #eee; padding-top: 20px; }
        .bio-output { background-color: #e9ecef; padding: 10px; border-radius: 4px; margin-bottom: 10px; white-space: pre-wrap; font-size: 0.9em; }
        #loading { display: none; margin-top: 15px; color: #555; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI Bio Generator</h1>
        <p>Craft the perfect Instagram bio with AI!</p>
        <label for="keywords">Keywords (e.g., photographer, traveler):</label>
        <input type="text" id="keywords" placeholder="Separate with commas">

        <label for="tone">Desired Tone:</label>
        <select id="tone">
            <option value="witty">Witty</option>
            <option value="professional">Professional</option>
            <option value="minimalist">Minimalist</option>
            <option value="creative">Creative</option>
            <option value="adventurous">Adventurous</option>
        </select>

        <button id="generateBtn">Generate Bios ($1)</button>
        <div id="loading">Generating...</div>
        <div id="results"></div>
    </div>

    <script src="https://js.stripe.com/v3/"></script>
    <script>
        const stripe = Stripe('YOUR_STRIPE_PUBLIC_KEY'); // Replace with your actual public key
        const generateBtn = document.getElementById('generateBtn');
        const keywordsInput = document.getElementById('keywords');
        const toneSelect = document.getElementById('tone');
        const resultsDiv = document.getElementById('results');
        const loadingDiv = document.getElementById('loading');

        generateBtn.addEventListener('click', async () => {
            loadingDiv.style.display = 'block';
            resultsDiv.innerHTML = '';

            try {
                // In a real app, this would hit a Vercel serverless function endpoint
                // that creates a Stripe Checkout session.
                const response = await fetch('/api/create-checkout-session', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ keywords: keywordsInput.value, tone: toneSelect.value })
                });
                const session = await response.json();

                const result = await stripe.redirectToCheckout({
                    sessionId: session.id
                });

                if (result.error) {
                    alert(result.error.message);
                    loadingDiv.style.display = 'none';
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to initiate checkout. Please try again.');
                loadingDiv.style.display = 'none';
            }
        });

        // This is a placeholder. In a real app, successful checkout would trigger
        // a webhook to generate and display the bios.
        // For this simplified example, we'll simulate a gen after an imagined success.
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('payment_status') === 'success') {
                loadingDiv.textContent = 'Payment successful! Generating your bios...';
                loadingDiv.style.display = 'block';
                // Simulate AI bio generation after payment success, normally done via webhook
                setTimeout(() => {
                    const mockBios = [
                        "📸 Capturing life's fleeting moments. Wanderlust with a lens. Dreamer. Creator.",
                        "Professional photographer with a passion for storytelling through stills. Let's create magic.",
                        "Minimalist | Photographer | Explorer of light and shadow."
                    ];
                    loadingDiv.style.display = 'none';
                    mockBios.forEach(bio => {
                        const bioEl = document.createElement('p');
                        bioEl.className = 'bio-output';
                        bioEl.textContent = bio;
                        resultsDiv.appendChild(bioEl);
                    });
                }, 2000);
            }
        });
    </script>
</body>
</html>
