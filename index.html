<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioGenie AI</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✨</text></svg>">
    <style>
        body { background: linear-gradient(to right, #6EE7B7, #3B82F6); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-lg shadow-xl max-w-lg w-full text-center">
        <h1 class="text-4xl font-bold text-gray-800 mb-4">BioGenie AI ✨</h1>
        <p class="text-gray-600 mb-6">Craft your perfect Instagram bio. Fast, fun & fresh!</p>
        <form id="bioForm" class="space-y-4">
            <input type="text" id="keywords" placeholder="e.g. entrepreneur, traveler, foodie" class="w-full p-3 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent" required>
            <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50">
                Generate Bio Ideas!
            </button>
        </form>
        <div id="results" class="mt-6 space-y-3 text-left hidden">
            <h2 class="text-xl font-semibold text-gray-700">Your Bios:</h2>
        </div>
        <p class="text-sm text-gray-500 mt-8">One-time purchase for unlimited bios!</p>
    </div>
    <script>
        document.getElementById('bioForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const keywords = document.getElementById('keywords').value;
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<h2 class="text-xl font-semibold text-gray-700">Your Bios:</h2><p class="text-gray-500">Generating...</p>';
            resultsDiv.classList.remove('hidden');

            // This is a placeholder for actual AI generation & Stripe integration.
            // In a real app, this would hit your backend API.
            const dummyBios = [
                `Entrepreneur 🚀 | Global Explorer ✈️ | Fuelled by Coffee & New Ideas 💡`,
                `Wanderlust & Wi-Fi ✨ | Building Dreams & Sipping Cocktails 🍹 | Follow my journey! 👇`,
                `Foodie at Heart 🍔🍕 | Tech Enthusiast 💻 | Life's too short for boring bios. Let's connect! 🤝`,
                `Creator | Innovator | Making magic happen everyday ✨ | DM for collabs!`,
                `Living my best life, one adventure at a time. 🌍📸 | Good vibes only. 😎`
            ];
            
            setTimeout(() => {
                resultsDiv.innerHTML = '<h2 class="text-xl font-semibold text-gray-700">Your Bios:</h2>' + dummyBios.map(bio => `<p class="bg-blue-50 p-2 rounded-md border border-blue-200">${bio}</p>`).join('');
            }, 1500); // Simulate API call
        });
    </script>
</body>
</html>
