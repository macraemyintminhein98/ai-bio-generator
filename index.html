<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>InstaBio AI</title><meta name="description" content="Generate creative Instagram bios with AI."><style>body{font-family:sans-serif;margin:0;padding:20px;background:#f9f9f9;color:#333;text-align:center}h1{color:#007bff}p{margin-bottom:20px}.card{background:#fff;border-radius:10px;box-shadow:0 4px 8px rgba(0,0,0,.1);padding:30px;max-width:600px;margin:20px auto}input,select,button{width:calc(100% - 20px);padding:12px;margin-bottom:15px;border:1px solid #ddd;border-radius:5px;font-size:16px}button{background:#007bff;color:#fff;border:none;cursor:pointer;transition:background .3s}.bio-output{background:#f0f7ff;border:1px dashed #a8d9ff;padding:20px;border-radius:5px;min-height:50px;text-align:left;white-space:pre-wrap;font-size:1.1em}.copy-btn{background:#28a745;margin-top:10px}.copy-btn:hover{background:#218838}.button:hover{background:#0056b3}</style></head><body><div class="card"><h1>InstaBio AI</h1><p>Craft your perfect Instagram bio instantly with AI.</p><input type="text" id="keywords" placeholder="Keywords (e.g., photographer, traveler, dog mom)"><select id="style"><option value="witty">Witty</option><option value="professional">Professional</option><option value="minimalist">Minimalist</option><option value="inspirational">Inspirational</option></select><button onclick="generateBio()">Generate Bio</button><div class="bio-output" id="bioOutput">Your AI-generated bio will appear here.</div><button class="copy-btn" onclick="copyBio()">Copy to Clipboard</button></div><script>async function generateBio(){const keywords=document.getElementById('keywords').value;const style=document.getElementById('style').value;const bioOutput=document.getElementById('bioOutput');bioOutput.textContent='Generating...';try{const response=await fetch('/api/generate-bio',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({keywords,style})});const data=await response.json();if(data.bio){bioOutput.textContent=data.bio;}else{bioOutput.textContent='Error generating bio: '+data.error;}}catch(error){bioOutput.textContent='Network error: '+error.message;}}function copyBio(){const bioText=document.getElementById('bioOutput').textContent;navigator.clipboard.writeText(bioText).then(()=>{alert('Bio copied to clipboard!');}).catch(err=>{console.error('Failed to copy: ',err);});}</script></body></html>
