<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioGenie AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; margin: 0; padding: 20px; background-color: #f7f9fc; color: #333; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { background-color: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 600px; width: 100%; text-align: center; }
        h1 { color: #5a189a; margin-bottom: 25px; font-size: 2.2em; }
        p { margin-bottom: 25px; line-height: 1.6; color: #555; }
        textarea { width: calc(100% - 20px); padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; font-size: 1em; resize: vertical; min-height: 80px; }
        button { background-color: #7b2cbf; color: white; padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1em; transition: background-color 0.3s ease; margin: 5px; }
        button:hover { background-color: #5a189a; }
        .bio-output { margin-top: 30px; text-align: left; }
        .bio-item { background-color: #f0e6f9; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #d4b4e7; position: relative; }
        .copy-btn { position: absolute; top: 10px; right: 10px; padding: 8px 12px; font-size: 0.9em; background-color: #a77cda; }
        .copy-btn:hover { background-color: #8c5cd6; }
        footer { margin-top: 40px; font-size: 0.9em; color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <h1>BioGenie AI ✨</h1>
        <p>Craft your perfect Instagram bio instantly!</p>
        <textarea id="keywordsInput" placeholder="e.g., photographer, travel, foodie, dog lover, entrepreneur..."></textarea>
        <button onclick="generateBios()">Generate Bios</button>
        <div id="bioOutput" class="bio-output"></div>
    </div>
    <footer>
        &copy; 2023 BioGenie AI. All rights reserved.
    </footer>

    <script>
        async function generateBios() {
            const keywords = document.getElementById('keywordsInput').value;
            const bioOutputDiv = document.getElementById('bioOutput');
            bioOutputDiv.innerHTML = '<p>Generating amazing bios for you...</p>';

            // In a real app, you'd send 'keywords' to a backend AI API.
            // For this example, we'll simulate some results.
            try {
                // Placeholder for actual API call
                // const response = await fetch('/api/generate-bio', { 
                //     method: 'POST', body: JSON.stringify({ keywords }), headers: { 'Content-Type': 'application/json' }
                // });
                // const data = await response.json();
                // const bios = data.bios;

                // ⭐ Simulated AI results ⭐
                const simulatedBios = [
                    `📸 Photographer | ✈️ Wanderlust | Chasing light & moments worldwide. Let's create! ✨`,
                    `Foodie by heart ❤️ | Exploring global flavors. Join me on my culinary adventures! 🍜🥂`,
                    `Dog mom to Max 🐾 | Coffee enthusiast ☕ | Living life one adventure at a time. Spread kindness! 😊`,
                    `Building dreams, one line of code at a time 💻 | Entrepreneur | Inspiring innovation. Connect & grow! 🌱`
                ];

                bioOutputDiv.innerHTML = '';
                simulatedBios.forEach(bio => {
                    const bioItem = document.createElement('div');
                    bioItem.className = 'bio-item';
                    bioItem.innerHTML = `<p>${bio}</p><button class="copy-btn" onclick="copyToClipboard(this, '${bio}')">Copy</button>`;
                    bioOutputDiv.appendChild(bioItem);
                });

            } catch (error) {
                console.error('Error generating bios:', error);
                bioOutputDiv.innerHTML = '<p style="color: red;">Oops! Something went wrong. Please try again later.</p>';
            }
        }

        function copyToClipboard(button, text) {
            navigator.clipboard.writeText(text).then(() => {
                button.textContent = 'Copied!';
                button.style.backgroundColor = '#4CAF50';
                setTimeout(() => {
                    button.textContent = 'Copy';
                    button.style.backgroundColor = '#a77cda';
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy text: ', err);
            });
        }
    </script>
</body>
</html>
