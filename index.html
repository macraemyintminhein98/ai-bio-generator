<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Bio Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; }
        .container { max-width: 600px; margin: 50px auto; padding: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.1); border-radius: 8px; }
        h1 { text-align: center; margin-bottom: 30px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input[type="text"], select, textarea { width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #4F46E5; color: white; padding: 12px 20px; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; }
        button:hover { background-color: #4338CA; }
        #output { background-color: #f9f9f9; padding: 15px; border-radius: 4px; border: 1px dashed #ddd; min-height: 80px; word-wrap: break-word; }
    </style>
</head>
<body class="bg-gray-100">
    <div class="container bg-white">
        <h1>⚡ AI Bio Generator</h1>
        <p class="mb-6 text-center text-gray-600">Craft the perfect Instagram bio with AI ✨</p>
        <form id="bioForm">
            <label for="keywords">Keywords (e.g., travel, foodie, artist):</label>
            <input type="text" id="keywords" placeholder="Enter comma-separated keywords" required>

            <label for="tone">Tone:</label>
            <select id="tone">
                <option value="professional">Professional</option>
                <option value="funny">Funny</option>
                <option value="aesthetic">Aesthetic</option>
                <option value="inspirational">Inspirational</option>
                <option value="casual">Casual</option>
            </select>

            <label for="length">Desired Length:</label>
            <select id="length">
                <option value="short">Short</option>
                <option value="medium">Medium</option>
                <option value="long">Long</option>
            </select>

            <button type="submit">Generate Bio</button>
        </form>

        <div class="mt-8">
            <label>Your AI-Generated Bio:</label>
            <div id="output">Your new bio will appear here.</div>
        </div>

        <p class="text-center mt-6 text-gray-500 text-sm">Powered by APEX</p>
    </div>
    <script>
        document.getElementById('bioForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const keywords = document.getElementById('keywords').value;
            const tone = document.getElementById('tone').value;
            const length = document.getElementById('length').value;
            const outputDiv = document.getElementById('output');
            outputDiv.textContent = 'Generating...';

            try {
                // In a real application, this would be an API call to your backend/OpenAI
                const mockResponse = `AI-generated bio for keywords: ${keywords}, tone: ${tone}, length: ${length}. Get ready for likes!`;
                outputDiv.textContent = mockResponse;
            } catch (error) {
                outputDiv.textContent = 'Error generating bio. Please try again.';
                console.error('Error:', error);
            }
        });
    </script>
</body>
</html>
