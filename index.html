<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>InstaBio AI</title><style>body{font-family:sans-serif;margin:0;padding:20px;background:#f4f7f6;color:#333}h1{color:#1a73e8;text-align:center}p{text-align:center;max-width:600px;margin:20px auto}form{display:flex;flex-direction:column;gap:15px;max-width:500px;margin:30px auto;padding:25px;background:#fff;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.08)}input[type=text],select,textarea{padding:12px;border:1px solid #ddd;border-radius:5px;font-size:16px}button{background:#4285f4;color:#fff;padding:12px 25px;border:none;border-radius:5px;font-size:18px;cursor:pointer;transition:background .3s ease}button:hover{background:#357ae8}#result{margin-top:30px;visibility:hidden;opacity:0;transition:opacity .5s ease;text-align:center;padding:15px;background:#e8f0fe;border-radius:8px;max-width:500px;margin:20px auto}footer{text-align:center;margin-top:50px;color:#777}</style></head><body><h1>AI Instagram Bio Generator</h1><p>Craft the perfect Instagram bio with AI! Just tell us about yourself.</p><form id="bioForm"><input type="text" id="keywords" placeholder="Keywords (e.g., tech, travel, foodie)" required><input type="text" id="profession" placeholder="Profession (e.g., software engineer, artist)"><select id="tone"><option value="professional">Professional</option><option value="funny">Funny</option><option value="personal">Personal</option><option value="inspirational">Inspirational</option></select><textarea id="interests" rows="3" placeholder="Interests (e.g., photography, coding, hiking)"></textarea><button type="submit">Generate Bio</button></form><div id="result"></div><footer>&copy; 2023 InstaBio AI</footer><script>document.getElementById('bioForm').addEventListener('submit',async(e)=>{e.preventDefault();const keywords=document.getElementById('keywords').value;const profession=document.getElementById('profession').value;const tone=document.getElementById('tone').value;const interests=document.getElementById('interests').value;const resultDiv=document.getElementById('result');resultDiv.innerHTML='Generating your bio...';resultDiv.style.visibility='visible';resultDiv.style.opacity='1';try{const response=await fetch('/api/generate-bio',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({keywords,profession,tone,interests})});if(!response.ok){throw new Error('Bio generation failed.');}const data=await response.json();resultDiv.innerHTML=`<h3>Your AI-Generated Bio:</h3><p>${data.bio}</p><button onclick="window.location.href='/checkout'">Get More Bios (&#36;${9.99})</button>`}catch(error){resultDiv.innerHTML=`<p>Error: ${error.message}</p>`}});</script></body></html>
