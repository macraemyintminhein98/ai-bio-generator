<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioGenius AI</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✨</text></svg>">
</head>
<body class="bg-gradient-to-br from-indigo-500 to-purple-600 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-lg shadow-xl p-8 max-w-md w-full text-center">
        <h1 class="text-4xl font-extrabold text-gray-800 mb-4">BioGenius AI ✨</h1>
        <p class="text-lg text-gray-600 mb-6">Craft your perfect Instagram bio, instantly.</p>
        <div class="space-y-4 mb-6">
            <input type="text" placeholder="Keywords (e.g., travel, entrepreneur)" class="w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
            <select class="w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
                <option value="">Select Tone</option>
                <option value="funny">Funny 😂</option>
                <option value="professional">Professional 👔</option>
                <option value="quirky">Quirky 🤪</option>
                <option value="inspirational">Inspirational ✨</option>
            </select>
        </div>
        <button class="bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-6 rounded-lg text-lg transition duration-300 ease-in-out w-full mb-4">
            Generate Bio
        </button>
        <div id="bio-output" class="bg-gray-100 p-4 rounded-md text-left text-gray-700 min-h-[80px] flex items-center justify-center">
            Your awesome bio will appear here!
        </div>
        <p class="text-sm text-gray-500 mt-6">Get unlimited bios for just $9.99</p>
        <button class="mt-3 bg-green-500 hover:bg-green-600 text-white font-semibold py-2 px-4 rounded-md transition duration-300 ease-in-out">
            Unlock Unlimited Bios
        </button>
    </div>
</body>
</html>
